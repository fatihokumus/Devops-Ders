<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 28px; font-weight: 700; fill: #17324d; }
      .label { font-family: Arial, sans-serif; font-size: 22px; font-weight: 600; fill: #17324d; }
      .text { font-family: Arial, sans-serif; font-size: 18px; font-weight: 400; fill: #1f2937; }
      .small { font-family: Arial, sans-serif; font-size: 16px; font-weight: 400; fill: #334155; }
      .box1 { fill: #f5f1e8; stroke: #9a7b4f; stroke-width: 3; rx: 18; }
      .box2 { fill: #e8f2ef; stroke: #2f7d68; stroke-width: 3; rx: 18; }
      .box3 { fill: #eef3fb; stroke: #4a6fa5; stroke-width: 3; rx: 18; }
      .arrow { stroke: #475569; stroke-width: 4; fill: none; marker-end: url(#m); }
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1200" height="720" fill="#fffdf8"/>
  <text x="60" y="70" class="title">Git Çalışma Modeli: Çalışma Dizini, Staging Alanı ve Yerel Depo</text>

  <rect x="70" y="150" width="300" height="390" class="box1"/>
  <text x="105" y="200" class="label">Çalışma Dizini</text>
  <text x="105" y="245" class="text">user-management-service/</text>
  <text x="120" y="285" class="small">src/main/java/edu/university/user</text>
  <text x="120" y="320" class="small">Application.java</text>
  <text x="120" y="355" class="small">User.java</text>
  <text x="120" y="390" class="small">UserRepository.java</text>
  <text x="120" y="425" class="small">UserService.java</text>
  <text x="105" y="485" class="text">Geliştirici burada dosya düzenler,</text>
  <text x="105" y="515" class="text">geçici denemeler yapar ve fark üretir.</text>

  <rect x="455" y="215" width="290" height="250" class="box2"/>
  <text x="500" y="265" class="label">Staging Area</text>
  <text x="495" y="315" class="text">git add UserRepository.java</text>
  <text x="495" y="350" class="text">git add UserService.java</text>
  <text x="495" y="400" class="text">Sadece mantıksal olarak ilişkili</text>
  <text x="495" y="430" class="text">değişiklikler commit için seçilir.</text>

  <rect x="830" y="150" width="300" height="390" class="box3"/>
  <text x="900" y="200" class="label">Yerel Git Deposu</text>
  <text x="875" y="245" class="text">c1 Initialize user</text>
  <text x="875" y="275" class="text">management service</text>
  <circle cx="895" cy="330" r="12" fill="#4a6fa5"/>
  <circle cx="975" cy="330" r="12" fill="#4a6fa5"/>
  <circle cx="1055" cy="330" r="12" fill="#4a6fa5"/>
  <line x1="895" y1="330" x2="975" y2="330" stroke="#4a6fa5" stroke-width="4"/>
  <line x1="975" y1="330" x2="1055" y2="330" stroke="#4a6fa5" stroke-width="4"/>
  <text x="880" y="380" class="text">Commit geçmişi anlık görüntülerden</text>
  <text x="880" y="410" class="text">oluşur ve geri izlenebilirlik sağlar.</text>
  <text x="880" y="470" class="text">git commit -m "..."</text>

  <line x1="370" y1="340" x2="455" y2="340" class="arrow" stroke="#475569" stroke-width="4" marker-end="url(#m)"/>
  <line x1="745" y1="340" x2="830" y2="340" class="arrow" stroke="#475569" stroke-width="4" marker-end="url(#m)"/>

  <text x="420" y="315" class="small">git add</text>
  <text x="775" y="315" class="small">git commit</text>
</svg>
